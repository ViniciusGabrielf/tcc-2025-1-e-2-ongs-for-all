name: Sync upstream and deploy EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-deploy-ec2-main
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        id: sync
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git remote add upstream https://github.com/TCC-CAS/tcc-2025-1-e-2-ongs-for-all.git || git remote set-url upstream https://github.com/TCC-CAS/tcc-2025-1-e-2-ongs-for-all.git

          git fetch upstream main

          BEFORE=$(git rev-parse HEAD)

          git merge -X theirs --no-edit upstream/main

          AFTER=$(git rev-parse HEAD)

          if [ "$BEFORE" != "$AFTER" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git push origin main
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EC2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.sync.outputs.changed == 'true'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          if [ -z "$EC2_HOST" ]; then echo "EC2_HOST não configurado"; exit 1; fi
          if [ -z "$EC2_USER" ]; then echo "EC2_USER não configurado"; exit 1; fi
          if [ -z "$EC2_PROJECT_PATH" ]; then echo "EC2_PROJECT_PATH não configurado"; exit 1; fi
          if [ -z "$PM2_APP_NAME" ]; then echo "PM2_APP_NAME não configurado"; exit 1; fi
          if [ -z "$EC2_SSH_KEY" ]; then echo "EC2_SSH_KEY não configurado"; exit 1; fi

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "$EC2_USER@$EC2_HOST" << EOF
            set -e

            echo "Entrando no projeto..."
            cd "$EC2_PROJECT_PATH"

            echo "Atualizando repositório..."
            git fetch origin main
            git reset --hard origin/main

            echo "Instalando dependências..."
            cd OngsForAll/Projeto
            npm ci

            echo "Removendo build antigo..."
            rm -rf dist

            echo "Gerando build..."
            npm run build

            echo "Reiniciando aplicação no PM2..."
            pm2 restart "$PM2_APP_NAME" --update-env || pm2 start dist/app.js --name "$PM2_APP_NAME"

            pm2 save

            echo "Deploy finalizado com sucesso."
          EOF